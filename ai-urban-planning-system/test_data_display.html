<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据测试页面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>AI城建系统数据测试</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>项目信息</h5>
                    </div>
                    <div class="card-body">
                        <p id="projectCount">加载中...</p>
                        <button class="btn btn-primary" onclick="loadProjectData()">刷新数据</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>资金安排</h5>
                    </div>
                    <div class="card-body">
                        <p id="fundingCount">加载中...</p>
                        <button class="btn btn-primary" onclick="loadFundingData()">刷新数据</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>项目总表</h5>
                    </div>
                    <div class="card-body">
                        <p id="summaryCount">加载中...</p>
                        <button class="btn btn-primary" onclick="loadSummaryData()">刷新数据</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>项目信息详情</h5>
                    </div>
                    <div class="card-body">
                        <div id="projectDetails">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadProjectData() {
            fetch('/api/project_info_page')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('projectCount').textContent = `项目数量: ${data.data.length}`;
                    displayProjectDetails(data.data);
                })
                .catch(error => {
                    document.getElementById('projectCount').textContent = `加载失败: ${error.message}`;
                });
        }
        
        function loadFundingData() {
            fetch('/api/funding_arrangement_page')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('fundingCount').textContent = `资金安排数量: ${data.data.length}`;
                })
                .catch(error => {
                    document.getElementById('fundingCount').textContent = `加载失败: ${error.message}`;
                });
        }
        
        function loadSummaryData() {
            fetch('/api/project_summary_page')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('summaryCount').textContent = `总表记录数: ${data.data.length}`;
                })
                .catch(error => {
                    document.getElementById('summaryCount').textContent = `加载失败: ${error.message}`;
                });
        }
        
        function displayProjectDetails(projects) {
            const detailsDiv = document.getElementById('projectDetails');
            let html = '<table class="table table-striped"><thead><tr><th>项目名称</th><th>项目编码</th><th>区域</th><th>状态</th></tr></thead><tbody>';
            
            projects.slice(0, 10).forEach(project => {
                html += `<tr>
                    <td>${project.project_name || ''}</td>
                    <td>${project.project_code || ''}</td>
                    <td>${project.region || ''}</td>
                    <td>${project.project_status || ''}</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            detailsDiv.innerHTML = html;
        }
        
        // 页面加载时自动加载数据
        window.onload = function() {
            loadProjectData();
            loadFundingData();
            loadSummaryData();
        };
    </script>
</body>
</html>
