<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 在线AI城建系统</title>
    
    <!-- Bootstrap CSS (国内镜像) -->
    <link href="https://cdn.staticfile.org/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (国内镜像) -->
    <link href="https://cdn.staticfile.org/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* 护眼主题 */
        :root {
            --eye-care-bg: #f6f8f6;
            --eye-care-card: #f9faf9;
            --eye-care-table: #fdfefd;
            --eye-care-input: #fafbfa;
            --eye-care-border: #e8ebe8;
            --eye-care-text: #2d3e2d;
            --eye-care-text-muted: #556b55;
        }
        
        body {
            background: var(--eye-care-bg);
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: var(--eye-care-card);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(45, 62, 45, 0.12);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--eye-care-border);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h2 {
            color: var(--eye-care-text);
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: var(--eye-care-text-muted);
        }
        
        .form-control {
            background-color: var(--eye-care-input) !important;
            border: 1px solid var(--eye-care-border) !important;
            color: var(--eye-care-text) !important;
            padding: 12px 15px;
            border-radius: 8px;
        }
        
        .form-control:focus {
            background-color: var(--eye-care-table) !important;
            border-color: #28a745 !important;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.15) !important;
            color: var(--eye-care-text) !important;
        }
        
        .btn-login {
            background: linear-gradient(45deg, #28a745, #34ce57);
            border: none;
            border-radius: 8px;
            padding: 12px;
            color: white;
            transition: all 0.3s ease;
            width: 100%;
            font-weight: 500;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
            color: white;
        }
        
        .form-label {
            color: var(--eye-care-text) !important;
            font-weight: 500;
        }
        
        .input-group-text {
            background-color: var(--eye-care-input) !important;
            border: 1px solid var(--eye-care-border) !important;
            color: var(--eye-care-text-muted) !important;
        }
        
        .alert {
            border-radius: 8px;
            border: 1px solid var(--eye-care-border);
        }
        
        .alert-danger {
            background-color: rgba(220, 53, 69, 0.1);
            color: #721c24;
            border-color: rgba(220, 53, 69, 0.3);
        }
        
        .alert-success {
            background-color: rgba(40, 167, 69, 0.1);
            color: #155724;
            border-color: rgba(40, 167, 69, 0.3);
        }
        
        .login-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--eye-care-border);
        }
        
        .login-footer small {
            color: var(--eye-care-text-muted);
        }
        
        .demo-credentials {
            background: rgba(40, 167, 69, 0.05);
            border: 1px solid rgba(40, 167, 69, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .demo-credentials h6 {
            color: #155724;
            margin-bottom: 10px;
        }
        
        .demo-credentials .credential-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: var(--eye-care-text);
        }
        
        .loading-spinner {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>
                <i class="fas fa-city me-2"></i>
                在线AI城建系统
            </h2>
            <p class="mb-0">请登录以继续使用系统</p>
        </div>
        
        <!-- 演示账号信息 -->
        <div class="demo-credentials">
            <h6>
                <i class="fas fa-info-circle me-2"></i>
                演示账号
            </h6>
            <div class="credential-item">
                <span><strong>管理员账号:</strong></span>
                <span>admin / admin123</span>
            </div>
            <div class="credential-item">
                <span><strong>功能:</strong></span>
                <span>所有权限</span>
            </div>
        </div>
        
        <div id="alertContainer"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="fas fa-user me-2"></i>用户名
                </label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" class="form-control" id="username" name="username" required 
                           placeholder="请输入用户名" autocomplete="username">
                </div>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label">
                    <i class="fas fa-lock me-2"></i>密码
                </label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="password" name="password" required 
                           placeholder="请输入密码" autocomplete="current-password">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                        <i class="fas fa-eye" id="passwordToggle"></i>
                    </button>
                </div>
            </div>
            
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
                    <label class="form-check-label" for="rememberMe">
                        记住我
                    </label>
                </div>
            </div>
            
            <button type="submit" class="btn btn-login">
                <span class="loading-spinner">
                    <i class="fas fa-spinner fa-spin me-2"></i>
                </span>
                <span class="login-text">
                    <i class="fas fa-sign-in-alt me-2"></i>登录
                </span>
            </button>
        </form>
        
        <div class="login-footer">
            <small>
                <i class="fas fa-shield-alt me-1"></i>
                系统采用护眼主题设计，保护您的视力健康
            </small>
        </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://cdn.staticfile.org/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.staticfile.org/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 页面加载完成后设置焦点
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('username').focus();
            
            // 检查是否有记住的用户名
            const savedUsername = localStorage.getItem('remembered_username');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('rememberMe').checked = true;
                document.getElementById('password').focus();
            }
        });
        
        // 切换密码显示
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const toggleIcon = document.getElementById('passwordToggle');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.className = 'fas fa-eye-slash';
            } else {
                passwordField.type = 'password';
                toggleIcon.className = 'fas fa-eye';
            }
        }
        
        // 显示提示消息
        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            alertContainer.innerHTML = alertHtml;
            
            // 5秒后自动隐藏
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                }
            }, 5000);
        }
        
        // 设置按钮加载状态
        function setLoadingState(isLoading) {
            const loginButton = document.querySelector('.btn-login');
            const spinner = document.querySelector('.loading-spinner');
            const loginText = document.querySelector('.login-text');
            
            if (isLoading) {
                loginButton.disabled = true;
                spinner.style.display = 'inline';
                loginText.innerHTML = '登录中...';
            } else {
                loginButton.disabled = false;
                spinner.style.display = 'none';
                loginText.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>登录';
            }
        }
        
        // 处理登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!username || !password) {
                showAlert('请输入用户名和密码');
                return;
            }
            
            setLoadingState(true);
            
            // 发送登录请求
            fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(response => response.json())
            .then(data => {
                setLoadingState(false);
                
                if (data.success) {
                    showAlert('登录成功，正在跳转...', 'success');
                    
                    // 保存用户信息到localStorage
                    localStorage.setItem('user_info', JSON.stringify(data.user));
                    localStorage.setItem('user_roles', JSON.stringify(data.roles));
                    localStorage.setItem('user_permissions', JSON.stringify(data.permissions));
                    localStorage.setItem('auth_token', data.token);
                    
                    // 处理记住用户名
                    if (rememberMe) {
                        localStorage.setItem('remembered_username', username);
                    } else {
                        localStorage.removeItem('remembered_username');
                    }
                    
                    // 1.5秒后跳转到主页
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showAlert(data.message || '登录失败');
                }
            })
            .catch(error => {
                setLoadingState(false);
                console.error('登录请求失败:', error);
                showAlert('网络错误，请稍后重试');
            });
        });
        
        // 快速填入演示账号（双击演示账号区域）
        document.querySelector('.demo-credentials').addEventListener('dblclick', function() {
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = 'admin123';
            showAlert('已填入演示账号信息', 'success');
        });
        
        // 回车键提交
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const loginForm = document.getElementById('loginForm');
                if (loginForm) {
                    loginForm.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>
</body>
</html>
