<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据展示测试 - AI城建系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .data-card { margin: 20px 0; }
        .data-table { margin-top: 15px; }
        .loading { text-align: center; padding: 20px; }
        .error { color: #dc3545; }
        .success { color: #28a745; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1>AI城建系统数据展示测试</h1>
        <p class="text-muted">此页面直接显示数据库中的数据，用于验证数据是否正确生成</p>
        
        <div class="row">
            <div class="col-12">
                <div class="card data-card">
                    <div class="card-header">
                        <h5>项目信息数据</h5>
                        <button class="btn btn-primary btn-sm" onclick="loadProjectData()">刷新数据</button>
                    </div>
                    <div class="card-body">
                        <div id="projectLoading" class="loading" style="display: none;">加载中...</div>
                        <div id="projectData"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-12">
                <div class="card data-card">
                    <div class="card-header">
                        <h5>资金安排数据</h5>
                        <button class="btn btn-primary btn-sm" onclick="loadFundingData()">刷新数据</button>
                    </div>
                    <div class="card-body">
                        <div id="fundingLoading" class="loading" style="display: none;">加载中...</div>
                        <div id="fundingData"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-12">
                <div class="card data-card">
                    <div class="card-header">
                        <h5>项目总表数据</h5>
                        <button class="btn btn-primary btn-sm" onclick="loadSummaryData()">刷新数据</button>
                    </div>
                    <div class="card-body">
                        <div id="summaryLoading" class="loading" style="display: none;">加载中...</div>
                        <div id="summaryData"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showLoading(elementId) {
            document.getElementById(elementId).style.display = 'block';
        }
        
        function hideLoading(elementId) {
            document.getElementById(elementId).style.display = 'none';
        }
        
        function loadProjectData() {
            const loadingId = 'projectLoading';
            const dataId = 'projectData';
            
            showLoading(loadingId);
            
            fetch('/api/project_info_page?' + new Date().getTime())
                .then(response => response.json())
                .then(data => {
                    hideLoading(loadingId);
                    
                    if (data.data && data.data.length > 0) {
                        let html = `<p class="success">✅ 成功加载 ${data.data.length} 条项目记录</p>`;
                        html += '<div class="table-responsive"><table class="table table-striped table-hover">';
                        html += '<thead><tr><th>项目名称</th><th>项目编码</th><th>区域</th><th>项目类型</th><th>投资模式</th><th>建设单位</th><th>项目状态</th><th>预算金额</th></tr></thead><tbody>';
                        
                        data.data.forEach(project => {
                            html += `<tr>
                                <td>${project.project_name || ''}</td>
                                <td>${project.project_code || ''}</td>
                                <td>${project.region || ''}</td>
                                <td>${project.project_type || ''}</td>
                                <td>${project.investment_mode || ''}</td>
                                <td>${project.construction_unit || ''}</td>
                                <td>${project.project_status || ''}</td>
                                <td>${project.budget_amount ? project.budget_amount.toLocaleString() + ' 万元' : ''}</td>
                            </tr>`;
                        });
                        
                        html += '</tbody></table></div>';
                        document.getElementById(dataId).innerHTML = html;
                    } else {
                        document.getElementById(dataId).innerHTML = '<p class="error">❌ 没有找到项目数据</p>';
                    }
                })
                .catch(error => {
                    hideLoading(loadingId);
                    document.getElementById(dataId).innerHTML = `<p class="error">❌ 加载失败: ${error.message}</p>`;
                });
        }
        
        function loadFundingData() {
            const loadingId = 'fundingLoading';
            const dataId = 'fundingData';
            
            showLoading(loadingId);
            
            fetch('/api/funding_arrangement_page?' + new Date().getTime())
                .then(response => response.json())
                .then(data => {
                    hideLoading(loadingId);
                    
                    if (data.data && data.data.length > 0) {
                        let html = `<p class="success">✅ 成功加载 ${data.data.length} 条资金记录</p>`;
                        html += '<div class="table-responsive"><table class="table table-striped table-hover">';
                        html += '<thead><tr><th>项目名称</th><th>项目编码</th><th>安排金额</th><th>资金来源</th><th>安排时间</th><th>备注</th></tr></thead><tbody>';
                        
                        data.data.forEach(funding => {
                            html += `<tr>
                                <td>${funding.project_name || ''}</td>
                                <td>${funding.project_code || ''}</td>
                                <td>${funding.arrangement_amount ? funding.arrangement_amount.toLocaleString() + ' 万元' : ''}</td>
                                <td>${funding.funding_source || ''}</td>
                                <td>${funding.arrangement_date || ''}</td>
                                <td>${funding.remarks || ''}</td>
                            </tr>`;
                        });
                        
                        html += '</tbody></table></div>';
                        document.getElementById(dataId).innerHTML = html;
                    } else {
                        document.getElementById(dataId).innerHTML = '<p class="error">❌ 没有找到资金数据</p>';
                    }
                })
                .catch(error => {
                    hideLoading(loadingId);
                    document.getElementById(dataId).innerHTML = `<p class="error">❌ 加载失败: ${error.message}</p>`;
                });
        }
        
        function loadSummaryData() {
            const loadingId = 'summaryLoading';
            const dataId = 'summaryData';
            
            showLoading(loadingId);
            
            fetch('/api/project_summary_page?' + new Date().getTime())
                .then(response => response.json())
                .then(data => {
                    hideLoading(loadingId);
                    
                    if (data.data && data.data.length > 0) {
                        let html = `<p class="success">✅ 成功加载 ${data.data.length} 条项目总表记录</p>`;
                        html += '<div class="table-responsive"><table class="table table-striped table-hover">';
                        html += '<thead><tr><th>项目名称</th><th>项目编码</th><th>总投资</th><th>已安排资金</th><th>剩余资金</th><th>完成率</th></tr></thead><tbody>';
                        
                        data.data.forEach(summary => {
                            const completionRate = summary.total_investment > 0 ? 
                                ((summary.arranged_funding / summary.total_investment) * 100).toFixed(1) + '%' : '0%';
                            
                            html += `<tr>
                                <td>${summary.project_name || ''}</td>
                                <td>${summary.project_code || ''}</td>
                                <td>${summary.total_investment ? summary.total_investment.toLocaleString() + ' 万元' : ''}</td>
                                <td>${summary.arranged_funding ? summary.arranged_funding.toLocaleString() + ' 万元' : ''}</td>
                                <td>${summary.remaining_funding ? summary.remaining_funding.toLocaleString() + ' 万元' : ''}</td>
                                <td>${completionRate}</td>
                            </tr>`;
                        });
                        
                        html += '</tbody></table></div>';
                        document.getElementById(dataId).innerHTML = html;
                    } else {
                        document.getElementById(dataId).innerHTML = '<p class="error">❌ 没有找到项目总表数据</p>';
                    }
                })
                .catch(error => {
                    hideLoading(loadingId);
                    document.getElementById(dataId).innerHTML = `<p class="error">❌ 加载失败: ${error.message}</p>`;
                });
        }
        
        // 页面加载时自动加载所有数据
        window.onload = function() {
            console.log('页面加载完成，开始加载数据...');
            loadProjectData();
            loadFundingData();
            loadSummaryData();
        };
    </script>
</body>
</html>
