<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>调试页面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>API调试页面</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>旧API测试</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-primary" onclick="testOldAPI()">测试 /api/project_info</button>
                        <div id="oldResult" class="mt-3"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>新API测试</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-success" onclick="testNewAPI()">测试 /api/project_info_page</button>
                        <div id="newResult" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>数据对比</h5>
                    </div>
                    <div class="card-body">
                        <div id="comparison"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function testOldAPI() {
            fetch('/api/project_info')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('oldResult').innerHTML = `
                        <div class="alert alert-info">
                            <strong>旧API结果:</strong><br>
                            数据类型: ${Array.isArray(data) ? '数组' : typeof data}<br>
                            记录数: ${Array.isArray(data) ? data.length : 'N/A'}<br>
                            前3条: ${Array.isArray(data) ? data.slice(0, 3).map(p => p.project_name).join(', ') : 'N/A'}
                        </div>
                    `;
                    window.oldData = data;
                    compareData();
                })
                .catch(error => {
                    document.getElementById('oldResult').innerHTML = `<div class="alert alert-danger">错误: ${error.message}</div>`;
                });
        }
        
        function testNewAPI() {
            fetch('/api/project_info_page')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('newResult').innerHTML = `
                        <div class="alert alert-success">
                            <strong>新API结果:</strong><br>
                            数据类型: ${typeof data}<br>
                            记录数: ${data.data ? data.data.length : 'N/A'}<br>
                            前3条: ${data.data ? data.data.slice(0, 3).map(p => p.project_name).join(', ') : 'N/A'}
                        </div>
                    `;
                    window.newData = data;
                    compareData();
                })
                .catch(error => {
                    document.getElementById('newResult').innerHTML = `<div class="alert alert-danger">错误: ${error.message}</div>`;
                });
        }
        
        function compareData() {
            if (window.oldData && window.newData) {
                const oldCount = Array.isArray(window.oldData) ? window.oldData.length : 0;
                const newCount = window.newData.data ? window.newData.data.length : 0;
                
                document.getElementById('comparison').innerHTML = `
                    <div class="alert alert-warning">
                        <strong>数据对比:</strong><br>
                        旧API记录数: ${oldCount}<br>
                        新API记录数: ${newCount}<br>
                        数据一致: ${oldCount === newCount ? '是' : '否'}
                    </div>
                `;
            }
        }
        
        // 页面加载时自动测试
        window.onload = function() {
            testOldAPI();
            testNewAPI();
        };
    </script>
</body>
</html>
