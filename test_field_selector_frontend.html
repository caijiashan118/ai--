<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字段筛选器功能测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container-fluid mt-4">
        <h2>字段筛选器功能测试</h2>
        
        <!-- 字段选择器 -->
        <div class="row mt-3 mb-3">
            <div class="col-12">
                <div class="card border-info">
                    <div class="card-header bg-info text-white py-2">
                        <h6 class="mb-0">
                            <i class="fas fa-columns me-2"></i>字段选择器
                            <button class="btn btn-sm btn-outline-light float-end" type="button" data-bs-toggle="collapse" data-bs-target="#columnSelector" aria-expanded="true">
                                <i class="fas fa-chevron-down"></i>
                            </button>
                        </h6>
                    </div>
                    <div class="collapse show" id="columnSelector">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <h6 class="text-muted mb-2">选择要显示的字段：</h6>
                                    <div class="btn-group-vertical w-100" role="group" id="columnSelectorButtons">
                                        <!-- 动态生成字段选择按钮 -->
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <h6 class="text-muted mb-2">操作：</h6>
                                    <div class="d-grid gap-2">
                                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="selectAllColumns()">
                                            <i class="fas fa-check-square me-1"></i>全选字段
                                        </button>
                                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="clearAllColumns()">
                                            <i class="fas fa-square me-1"></i>清空选择
                                        </button>
                                        <button type="button" class="btn btn-outline-success btn-sm" onclick="applyColumnSelection()">
                                            <i class="fas fa-eye me-1"></i>应用字段选择
                                        </button>
                                        <button type="button" class="btn btn-outline-warning btn-sm" onclick="resetColumnSelection()">
                                            <i class="fas fa-undo me-1"></i>重置字段
                                        </button>
                                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="manualInitializeColumnSelector()">
                                            <i class="fas fa-cog me-1"></i>手动初始化
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 测试结果 -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>测试结果</h5>
                    </div>
                    <div class="card-body">
                        <div id="testResults"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 数据表格 -->
        <div class="row mt-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>项目总表</h5>
                    </div>
                    <div class="card-body">
                        <table id="summaryTable" class="table table-striped table-bordered" style="width:100%">
                            <thead>
                                <tr>
                                    <th>项目名称</th>
                                    <th>项目编码</th>
                                    <th>建设单位</th>
                                    <th>项目主管部门</th>
                                    <th>安排金额</th>
                                    <th>资金来源</th>
                                    <th>资金性质</th>
                                    <th>财预文号</th>
                                    <th>安排年度</th>
                                    <th>经办人</th>
                                    <th>业务处</th>
                                    <th>上级资金文号</th>
                                    <th>备注</th>
                                    <th>项目状态</th>
                                    <th>概算编码</th>
                                    <th>概算项目名称</th>
                                    <th>所属区域</th>
                                    <th>投资模式</th>
                                    <th>项目类型</th>
                                    <th>立项时间</th>
                                    <th>概算批复金额</th>
                                    <th>签订合同金额</th>
                                    <th>开工时间</th>
                                    <th>完工时间</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 数据将通过DataTable加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 字段选择器相关功能
        let columnVisibility = {}; // 存储字段可见性状态
        let availableColumns = []; // 存储可用字段定义
        let summaryTable = null; // 存储表格实例

        // 定义可用字段
        const COLUMN_DEFINITIONS = [
            { data: 'project_name', title: '项目名称', visible: true },
            { data: 'project_code', title: '项目编码（可研）', visible: true },
            { data: 'construction_unit', title: '建设单位', visible: true },
            { data: 'supervisor_dept', title: '项目主管部门', visible: true },
            { data: 'arrangement_amount', title: '安排金额(万元)', visible: true },
            { data: 'funding_source', title: '资金来源', visible: true },
            { data: 'funding_nature', title: '资金性质', visible: true },
            { data: 'budget_doc_no', title: '财预文号', visible: true },
            { data: 'arrangement_year', title: '安排年度', visible: true },
            { data: 'handler', title: '经办人', visible: true },
            { data: 'handling_office', title: '业务处', visible: true },
            { data: 'superior_doc_no', title: '上级资金文号', visible: true },
            { data: 'remarks', title: '备注', visible: true },
            { data: 'project_status', title: '项目状态', visible: true },
            { data: 'budget_code', title: '概算编码', visible: true },
            { data: 'budget_project_name', title: '概算项目名称', visible: true },
            { data: 'region', title: '所属区域', visible: true },
            { data: 'investment_mode', title: '投资模式', visible: true },
            { data: 'project_type', title: '项目类型', visible: true },
            { data: 'approval_date', title: '立项时间', visible: true },
            { data: 'budget_amount', title: '概算批复金额(万元)', visible: true },
            { data: 'contract_amount', title: '签订合同金额(万元)', visible: true },
            { data: 'start_date', title: '开工时间', visible: true },
            { data: 'end_date', title: '完工时间', visible: true }
        ];

        // 初始化字段选择器
        function initializeColumnSelector() {
            console.log('初始化字段选择器...');
            
            const container = document.getElementById('columnSelectorButtons');
            if (!container) {
                console.error('字段选择器容器不存在');
                return false;
            }
            
            availableColumns = [...COLUMN_DEFINITIONS];
            
            // 初始化字段可见性状态
            availableColumns.forEach(column => {
                if (!(column.data in columnVisibility)) {
                    columnVisibility[column.data] = column.visible;
                }
            });
            
            generateColumnSelectorButtons();
            console.log('字段选择器初始化完成，可用字段数:', availableColumns.length);
            return true;
        }

        // 生成字段选择按钮
        function generateColumnSelectorButtons() {
            const container = document.getElementById('columnSelectorButtons');
            if (!container) {
                console.error('找不到columnSelectorButtons容器');
                return;
            }
            
            container.innerHTML = '';
            
            availableColumns.forEach((column, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = `btn btn-sm mb-1 ${column.visible ? 'btn-primary' : 'btn-outline-primary'}`;
                button.innerHTML = `
                    <i class="fas fa-${column.visible ? 'eye' : 'eye-slash'} me-1"></i>
                    ${column.title}
                `;
                button.onclick = () => toggleColumnVisibility(column.data, button);
                container.appendChild(button);
            });
        }

        // 切换字段可见性
        function toggleColumnVisibility(columnData, buttonElement) {
            columnVisibility[columnData] = !columnVisibility[columnData];
            
            if (columnVisibility[columnData]) {
                buttonElement.className = 'btn btn-sm mb-1 btn-primary';
                buttonElement.innerHTML = `<i class="fas fa-eye me-1"></i>${availableColumns.find(c => c.data === columnData).title}`;
            } else {
                buttonElement.className = 'btn btn-sm mb-1 btn-outline-primary';
                buttonElement.innerHTML = `<i class="fas fa-eye-slash me-1"></i>${availableColumns.find(c => c.data === columnData).title}`;
            }
        }

        // 全选字段
        function selectAllColumns() {
            availableColumns.forEach(column => {
                columnVisibility[column.data] = true;
            });
            generateColumnSelectorButtons();
            addTestResult('✅ 全选字段功能正常');
        }

        // 清空字段选择
        function clearAllColumns() {
            availableColumns.forEach(column => {
                columnVisibility[column.data] = false;
            });
            generateColumnSelectorButtons();
            addTestResult('✅ 清空字段选择功能正常');
        }

        // 应用字段选择
        function applyColumnSelection() {
            if (!summaryTable) {
                addTestResult('❌ 表格未初始化，无法应用字段选择');
                return;
            }
            
            try {
                const selectedColumns = availableColumns.filter(column => columnVisibility[column.data]);
                
                if (selectedColumns.length === 0) {
                    addTestResult('⚠️ 请至少选择一个字段');
                    return;
                }
                
                addTestResult(`✅ 应用字段选择成功，选中 ${selectedColumns.length} 个字段`);
                
                // 这里可以添加实际的表格更新逻辑
                
            } catch (error) {
                console.error('应用字段选择失败:', error);
                addTestResult('❌ 应用字段选择失败: ' + error.message);
            }
        }

        // 重置字段选择
        function resetColumnSelection() {
            availableColumns.forEach(column => {
                columnVisibility[column.data] = true;
            });
            generateColumnSelectorButtons();
            addTestResult('✅ 重置字段选择功能正常');
        }

        // 手动初始化字段选择器
        function manualInitializeColumnSelector() {
            console.log('手动初始化字段选择器...');
            availableColumns = [];
            columnVisibility = {};
            
            const success = initializeColumnSelector();
            if (success) {
                addTestResult('✅ 手动初始化字段选择器成功');
            } else {
                addTestResult('❌ 手动初始化字段选择器失败');
            }
        }

        // 添加测试结果
        function addTestResult(message) {
            const resultsDiv = document.getElementById('testResults');
            const timestamp = new Date().toLocaleTimeString();
            resultsDiv.innerHTML += `<div class="alert alert-info">[${timestamp}] ${message}</div>`;
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }

        // 初始化表格
        function initializeTable() {
            if (summaryTable) {
                summaryTable.destroy();
            }
            
            summaryTable = $('#summaryTable').DataTable({
                processing: true,
                serverSide: true,
                ajax: {
                    url: '/api/project_summary_page',
                    type: 'GET'
                },
                columns: COLUMN_DEFINITIONS.map(col => ({
                    data: col.data,
                    title: col.title
                })),
                pageLength: 10,
                language: {
                    "sProcessing": "处理中...",
                    "sLengthMenu": "显示 _MENU_ 项",
                    "sZeroRecords": "没有数据",
                    "sInfo": "显示 _START_ 至 _END_ 项，共 _TOTAL_ 项",
                    "sInfoEmpty": "显示 0 至 0 项，共 0 项",
                    "sInfoFiltered": "(从 _MAX_ 项中过滤)",
                    "sSearch": "搜索:",
                    "sEmptyTable": "表中数据为空",
                    "sLoadingRecords": "载入中...",
                    "oPaginate": {
                        "sFirst": "首页",
                        "sPrevious": "上页",
                        "sNext": "下页",
                        "sLast": "末页"
                    }
                }
            });
            
            addTestResult('✅ 数据表格初始化成功');
        }

        // 页面加载完成后初始化
        $(document).ready(function() {
            addTestResult('🚀 开始字段筛选器功能测试...');
            
            // 初始化字段选择器
            const success = initializeColumnSelector();
            if (success) {
                addTestResult('✅ 字段选择器初始化成功');
            } else {
                addTestResult('❌ 字段选择器初始化失败');
            }
            
            // 初始化表格
            initializeTable();
        });
    </script>
</body>
</html>
