<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能图表模块前端测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.staticfile.org/plotly.js/2.27.0/plotly.min.js"></script>
    <style>
        .chart-container {
            height: 400px;
            width: 100%;
        }
        .status-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1><i class="fas fa-chart-bar me-2"></i>智能图表模块前端测试</h1>
        <p class="text-muted">测试基于项目总表的图表数据加载和显示功能</p>
        
        <!-- 数据状态显示 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <h5 id="totalProjects">-</h5>
                        <p class="mb-0">总项目数</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <h5 id="totalFunding">-</h5>
                        <p class="mb-0">总投资金额(万元)</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <h5 id="totalBudget">-</h5>
                        <p class="mb-0">总概算金额(万元)</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card status-card">
                    <div class="card-body text-center">
                        <h5 id="totalContract">-</h5>
                        <p class="mb-0">总合同金额(万元)</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-pie me-2"></i>项目状态分布</h5>
                    </div>
                    <div class="card-body">
                        <div id="statusChart" class="chart-container"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-bar me-2"></i>区域分布</h5>
                    </div>
                    <div class="card-body">
                        <div id="regionChart" class="chart-container"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-line me-2"></i>年度资金趋势</h5>
                    </div>
                    <div class="card-body">
                        <div id="yearlyChart" class="chart-container"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-table me-2"></i>透视表测试</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">分组字段:</label>
                            <select id="groupBySelect" class="form-select">
                                <option value="region">所属区域</option>
                                <option value="project_type">项目类型</option>
                                <option value="funding_source">资金来源</option>
                                <option value="investment_mode">投资模式</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">值字段:</label>
                            <select id="valueFieldSelect" class="form-select">
                                <option value="arrangement_amount">安排金额(万元)</option>
                                <option value="budget_amount">概算批复金额(万元)</option>
                                <option value="contract_amount">签订合同金额(万元)</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="loadPivotTable()">生成透视表</button>
                        <div id="pivotTable" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 日志显示 -->
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-terminal me-2"></i>加载日志</h5>
            </div>
            <div class="card-body">
                <div id="logContainer" style="height: 200px; overflow-y: auto; background: #f8f9fa; padding: 10px; border-radius: 5px;">
                    <div class="text-muted">等待数据加载...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartData = null;
        let analysisData = null;
        
        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `mb-1 text-${type === 'error' ? 'danger' : type === 'success' ? 'success' : 'muted'}`;
            logEntry.innerHTML = `[${timestamp}] ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        async function loadChartData() {
            try {
                log('开始加载图表数据...');
                const response = await fetch('/api/charts_data');
                const data = await response.json();
                
                if (data.success) {
                    chartData = data.data;
                    log(`✅ 图表数据加载成功，共${data.total}条记录`, 'success');
                    return true;
                } else {
                    log(`❌ 图表数据加载失败: ${data.message}`, 'error');
                    return false;
                }
            } catch (error) {
                log(`❌ 图表数据加载异常: ${error.message}`, 'error');
                return false;
            }
        }
        
        async function loadAnalysisData() {
            try {
                log('开始加载分析数据...');
                const response = await fetch('/api/charts_analysis');
                const data = await response.json();
                
                if (data.success) {
                    analysisData = data.data;
                    log(`✅ 分析数据加载成功`, 'success');
                    
                    // 更新统计卡片
                    document.getElementById('totalProjects').textContent = analysisData.total_projects.toLocaleString();
                    document.getElementById('totalFunding').textContent = analysisData.total_funding.toLocaleString();
                    document.getElementById('totalBudget').textContent = analysisData.total_budget.toLocaleString();
                    document.getElementById('totalContract').textContent = analysisData.total_contract.toLocaleString();
                    
                    return true;
                } else {
                    log(`❌ 分析数据加载失败: ${data.message}`, 'error');
                    return false;
                }
            } catch (error) {
                log(`❌ 分析数据加载异常: ${error.message}`, 'error');
                return false;
            }
        }
        
        function createStatusChart() {
            if (!analysisData) return;
            
            const statusData = analysisData.status_distribution;
            const data = [{
                values: Object.values(statusData),
                labels: Object.keys(statusData),
                type: 'pie',
                textinfo: 'label+percent',
                textposition: 'outside'
            }];
            
            const layout = {
                title: '项目状态分布',
                showlegend: true,
                height: 350
            };
            
            Plotly.newPlot('statusChart', data, layout);
            log('✅ 项目状态分布图生成完成', 'success');
        }
        
        function createRegionChart() {
            if (!analysisData) return;
            
            const regionData = analysisData.region_distribution;
            const data = [{
                x: Object.keys(regionData),
                y: Object.values(regionData),
                type: 'bar',
                marker: { color: 'rgba(102, 126, 234, 0.8)' }
            }];
            
            const layout = {
                title: '区域分布',
                xaxis: { title: '区域' },
                yaxis: { title: '项目数量' },
                height: 350
            };
            
            Plotly.newPlot('regionChart', data, layout);
            log('✅ 区域分布图生成完成', 'success');
        }
        
        function createYearlyChart() {
            if (!analysisData) return;
            
            const yearlyData = analysisData.yearly_funding;
            const years = Object.keys(yearlyData).sort();
            const amounts = years.map(year => yearlyData[year]);
            
            const data = [{
                x: years,
                y: amounts,
                type: 'scatter',
                mode: 'lines+markers',
                name: '资金安排',
                line: { color: 'rgba(118, 75, 162, 0.8)' }
            }];
            
            const layout = {
                title: '年度资金安排趋势',
                xaxis: { title: '年份' },
                yaxis: { title: '金额(万元)' },
                height: 350
            };
            
            Plotly.newPlot('yearlyChart', data, layout);
            log('✅ 年度资金趋势图生成完成', 'success');
        }
        
        async function loadPivotTable() {
            try {
                const groupBy = document.getElementById('groupBySelect').value;
                const valueField = document.getElementById('valueFieldSelect').value;
                
                log(`开始加载透视表数据: ${groupBy} × ${valueField}...`);
                
                const response = await fetch(`/api/pivot_table?group_by=${groupBy}&value_field=${valueField}&agg_func=sum`);
                const data = await response.json();
                
                if (data.success) {
                    const pivotData = data.data.pivot_data;
                    const tableContainer = document.getElementById('pivotTable');
                    
                    let tableHTML = `
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>${data.data.group_by_title}</th>
                                    <th>数量</th>
                                    <th>${data.data.value_field_title}</th>
                                    <th>平均值</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    
                    pivotData.forEach(item => {
                        tableHTML += `
                            <tr>
                                <td>${item.group}</td>
                                <td>${item.count}</td>
                                <td>${item.value.toLocaleString()}</td>
                                <td>${item.avg.toLocaleString()}</td>
                            </tr>
                        `;
                    });
                    
                    tableHTML += '</tbody></table>';
                    tableContainer.innerHTML = tableHTML;
                    
                    log(`✅ 透视表生成完成，共${pivotData.length}个分组`, 'success');
                } else {
                    log(`❌ 透视表加载失败: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ 透视表加载异常: ${error.message}`, 'error');
            }
        }
        
        async function initializeCharts() {
            log('🚀 开始初始化智能图表模块...');
            
            // 加载数据
            const chartSuccess = await loadChartData();
            const analysisSuccess = await loadAnalysisData();
            
            if (chartSuccess && analysisSuccess) {
                // 生成图表
                createStatusChart();
                createRegionChart();
                createYearlyChart();
                
                log('🎉 智能图表模块初始化完成！', 'success');
            } else {
                log('❌ 智能图表模块初始化失败', 'error');
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initializeCharts);
    </script>
</body>
</html>
