<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能图表模块详细测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.staticfile.org/plotly.js/2.27.0/plotly.min.js"></script>
    <style>
        .log-container {
            height: 300px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-success { background-color: #28a745; }
        .status-error { background-color: #dc3545; }
        .status-warning { background-color: #ffc107; }
        .status-info { background-color: #17a2b8; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1><i class="fas fa-chart-bar me-2"></i>智能图表模块详细测试</h1>
        
        <!-- 测试控制面板 -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-cogs me-2"></i>测试控制面板</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <button class="btn btn-primary w-100" onclick="testAPI()">
                                    <i class="fas fa-api me-2"></i>测试API
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-success w-100" onclick="testDataLoading()">
                                    <i class="fas fa-download me-2"></i>测试数据加载
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-warning w-100" onclick="testChartGeneration()">
                                    <i class="fas fa-chart-pie me-2"></i>测试图表生成
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-info w-100" onclick="clearLogs()">
                                    <i class="fas fa-trash me-2"></i>清空日志
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 状态显示 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <div id="apiStatus" class="status-indicator status-warning"></div>
                        <strong>API状态</strong>
                        <div id="apiStatusText">未测试</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <div id="dataStatus" class="status-indicator status-warning"></div>
                        <strong>数据状态</strong>
                        <div id="dataStatusText">未加载</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <div id="chartStatus" class="status-indicator status-warning"></div>
                        <strong>图表状态</strong>
                        <div id="chartStatusText">未生成</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <div id="overallStatus" class="status-indicator status-warning"></div>
                        <strong>总体状态</strong>
                        <div id="overallStatusText">检测中</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 测试结果 -->
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-terminal me-2"></i>测试日志</h5>
                    </div>
                    <div class="card-body">
                        <div id="logContainer" class="log-container">
                            <div class="text-muted">等待测试开始...</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-pie me-2"></i>测试图表</h5>
                    </div>
                    <div class="card-body">
                        <div id="testChart" style="height: 300px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let testData = null;
        let testResults = {
            api: false,
            data: false,
            chart: false
        };
        
        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            
            let statusClass = 'status-info';
            if (type === 'success') statusClass = 'status-success';
            else if (type === 'error') statusClass = 'status-error';
            else if (type === 'warning') statusClass = 'status-warning';
            
            logEntry.innerHTML = `
                <span class="${statusClass}"></span>
                [${timestamp}] ${message}
            `;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        function updateStatus(statusType, success, message) {
            const statusElement = document.getElementById(`${statusType}Status`);
            const textElement = document.getElementById(`${statusType}StatusText`);
            
            if (success) {
                statusElement.className = 'status-indicator status-success';
                textElement.textContent = message;
            } else {
                statusElement.className = 'status-indicator status-error';
                textElement.textContent = message;
            }
            
            testResults[statusType] = success;
            updateOverallStatus();
        }
        
        function updateOverallStatus() {
            const overallStatus = document.getElementById('overallStatus');
            const overallText = document.getElementById('overallStatusText');
            
            const allPassed = Object.values(testResults).every(result => result);
            const anyFailed = Object.values(testResults).some(result => result === false);
            
            if (allPassed) {
                overallStatus.className = 'status-indicator status-success';
                overallText.textContent = '全部通过';
            } else if (anyFailed) {
                overallStatus.className = 'status-indicator status-error';
                overallText.textContent = '存在问题';
            } else {
                overallStatus.className = 'status-indicator status-warning';
                overallText.textContent = '检测中';
            }
        }
        
        async function testAPI() {
            log('开始测试API连接...', 'info');
            try {
                const response = await fetch('/api/charts_data');
                log(`API响应状态: ${response.status}`, 'info');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                log(`API响应数据: ${JSON.stringify(data).substring(0, 100)}...`, 'info');
                
                if (data.success && data.data) {
                    log(`✅ API测试成功: ${data.data.length}条记录`, 'success');
                    updateStatus('api', true, `成功 (${data.data.length}条)`);
                    testData = data.data;
                } else {
                    log(`❌ API数据格式错误: success=${data.success}, hasData=${!!data.data}`, 'error');
                    updateStatus('api', false, '数据格式错误');
                }
            } catch (error) {
                log(`❌ API测试失败: ${error.message}`, 'error');
                updateStatus('api', false, '连接失败');
            }
        }
        
        async function testDataLoading() {
            log('开始测试数据加载...', 'info');
            
            if (!testData) {
                log('❌ 没有测试数据，请先测试API', 'error');
                updateStatus('data', false, '无数据');
                return;
            }
            
            try {
                // 模拟loadChartsData函数的逻辑
                const chartsData = testData;
                const pivotData = testData;
                
                if (Array.isArray(chartsData) && chartsData.length > 0) {
                    log(`✅ 数据加载成功: ${chartsData.length}条记录`, 'success');
                    log(`数据示例: ${chartsData[0].project_name}`, 'info');
                    
                    // 检查必要字段
                    const requiredFields = ['project_name', 'arrangement_amount', 'region', 'project_type'];
                    const missingFields = requiredFields.filter(field => !(field in chartsData[0]));
                    
                    if (missingFields.length === 0) {
                        log('✅ 数据字段完整', 'success');
                        updateStatus('data', true, `已加载 (${chartsData.length}条)`);
                    } else {
                        log(`❌ 缺少必要字段: ${missingFields.join(', ')}`, 'error');
                        updateStatus('data', false, '字段缺失');
                    }
                } else {
                    log('❌ 数据格式错误: 不是数组或为空', 'error');
                    updateStatus('data', false, '格式错误');
                }
            } catch (error) {
                log(`❌ 数据加载失败: ${error.message}`, 'error');
                updateStatus('data', false, '加载失败');
            }
        }
        
        async function testChartGeneration() {
            log('开始测试图表生成...', 'info');
            
            if (!testData) {
                log('❌ 没有测试数据，请先测试数据加载', 'error');
                updateStatus('chart', false, '无数据');
                return;
            }
            
            try {
                // 生成简单的测试图表
                const statusCounts = {};
                testData.forEach(item => {
                    const status = item.project_status || '未知';
                    statusCounts[status] = (statusCounts[status] || 0) + 1;
                });
                
                const chartData = [{
                    values: Object.values(statusCounts),
                    labels: Object.keys(statusCounts),
                    type: 'pie',
                    textinfo: 'label+percent'
                }];
                
                const layout = {
                    title: '项目状态分布测试',
                    height: 300
                };
                
                Plotly.newPlot('testChart', chartData, layout);
                log('✅ 图表生成成功', 'success');
                updateStatus('chart', true, '已生成');
                
            } catch (error) {
                log(`❌ 图表生成失败: ${error.message}`, 'error');
                updateStatus('chart', false, '生成失败');
            }
        }
        
        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '<div class="text-muted">日志已清空...</div>';
            testResults = { api: false, data: false, chart: false };
            updateOverallStatus();
        }
        
        // 页面加载完成后自动开始测试
        document.addEventListener('DOMContentLoaded', function() {
            log('页面加载完成，开始自动测试...', 'info');
            setTimeout(() => {
                testAPI().then(() => {
                    if (testResults.api) {
                        testDataLoading().then(() => {
                            if (testResults.data) {
                                testChartGeneration();
                            }
                        });
                    }
                });
            }, 1000);
        });
    </script>
</body>
</html>
